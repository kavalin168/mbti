<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 16型人格专业测试 - 32题完整版</title>
  <meta property="og:title" content="MBTI 16型人格专业测试">
  <meta property="og:description" content="超准32题MBTI测试，测出你的真实人格、职业、爱情、优势">
  <meta property="og:image" content="https://picsum.photos/600/400">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Microsoft YaHei',sans-serif}
    body{background:#f6f8ff;padding:20px;color:#222}
    .container{max-width:700px;margin:0 auto;background:white;border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,0.08);padding:30px;overflow:hidden}
    .header{text-align:center;margin-bottom:30px}
    .header h1{font-size:26px;color:#4a6cf6;margin-bottom:10px}
    .header p{color:#666;font-size:15px}
    .progress{width:100%;height:10px;background:#eee;border-radius:10px;margin-bottom:25px}
    .bar{height:100%;background:linear-gradient(90deg,#4a6cf6,#8c52ff);width:0%;border-radius:10px;transition:.3s}
    .question{display:none;padding:10px 0}
    .question.active{display:block}
    .q-title{font-size:18px;font-weight:500;margin-bottom:20px;line-height:1.6}
    .options{display:flex;flex-direction:column;gap:12px}
    .opt{padding:16px 20px;border:2px solid #eee;border-radius:16px;background:#fcfcfc;cursor:pointer}
    .opt.active{border-color:#4a6cf6;background:#eef3ff}
    .nav{display:flex;justify-content:space-between;margin-top:30px}
    button{padding:14px 22px;border:none;border-radius:14px;font-size:16px;font-weight:bold;cursor:pointer}
    .prev{background:#eee;color:#555}
    .next{background:#4a6cf6;color:white}
    .submit{background:#8c52ff;color:white;width:100%;margin-top:20px;display:none}
    .result{display:none;padding:20px 0}
    .result-title{text-align:center;font-size:22px;color:#333;margin-bottom:10px}
    .type{text-align:center;font-size:36px;font-weight:bold;color:#4a6cf6;margin:10px 0 20px}
    .result-box{background:#f5f7ff;padding:20px;border-radius:16px;margin-bottom:20px}
    .result-box h3{margin-bottom:10px;color:#4a6cf6}
    .result-box p{line-height:1.7;color:#444}
    .pay-card{background:linear-gradient(135deg,#8c52ff,#4a6cf6);color:white;padding:25px;border-radius:20px;text-align:center;margin-top:30px}
    .pay-card h2{margin-bottom:10px}
    .pay-card p{margin-bottom:20px;opacity:.9}
    .pay-btn{background:white;color:#8c52ff;padding:16px 30px;border-radius:14px;font-size:17px;width:100%}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center}
    .modal-content{background:white;padding:20px;border-radius:20px;max-width:350px;text-align:center}
    .modal-content img{width:240px;border-radius:12px;margin-bottom:15px}
    .modal-content p{color:#666;margin-bottom:15px}
    .close-btn{background:#4a6cf6;color:white;padding:10px 20px;border-radius:10px}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>MBTI 16型人格专业测试</h1>
    <p>32题完整版 | 超准人格解析 | 职业+爱情+优势</p>
  </div>
  <div class="progress"><div class="bar" id="bar"></div></div>

  <div id="questions"></div>

  <div class="nav">
    <button class="prev" id="prev">上一题</button>
    <button class="next" id="next">下一题</button>
  </div>
  <button class="submit" id="submit">生成结果</button>

  <div class="result" id="result">
    <div class="result-title">你的人格类型</div>
    <div class="type" id="mbti"></div>
    <div class="result-box">
      <h3>基础解析</h3>
      <p id="desc"></p>
    </div>
    <div class="result-box">
      <h3>你的核心特质</h3>
      <p>你拥有独特的思考方式与行为模式，本测试基于心理学标准模型生成。</p>
    </div>
    <div class="pay-card">
      <h2>🔓 解锁完整专业报告</h2>
      <p>包含：详细人格解析 + 职业方向 + 爱情匹配 + 成长建议 + 天赋优势</p>
      <button class="pay-btn" onclick="document.getElementById('payModal').style.display='flex'">立即支付 9.9 元解锁全部</button>
    </div>
  </div>
</div>

<div class="modal" id="payModal">
  <div class="modal-content">
    <h3>微信扫码支付 9.9 元</h3>
    <img src="https://i.imgur.com/8K6ZQHh.png" alt="微信收款码">
    <p>支付后即可查看完整报告</p>
    <button class="close-btn" onclick="document.getElementById('payModal').style.display='none'">关闭</button>
  </div>
</div>

<script>
const questions = [
  {q:"你更倾向于先行动再思考",a:"是",b:"否",t:"E"},
  {q:"你更常沉浸在自己的思考里",a:"是",b:"否",t:"I"},
  {q:"你喜欢热闹的社交场合",a:"是",b:"否",t:"E"},
  {q:"你需要独处来恢复精力",a:"是",b:"否",t:"I"},
  {q:"你更关注现实与细节",a:"是",b:"否",t:"S"},
  {q:"你更关注灵感与可能性",a:"是",b:"否",t:"N"},
  {q:"你相信经验大于想象",a:"是",b:"否",t:"S"},
  {q:"你经常思考未来的可能性",a:"是",b:"否",t:"N"},
  {q:"做决定时你更看重逻辑",a:"是",b:"否",t:"T"},
  {q:"做决定时你更看重感受",a:"是",b:"否",t:"F"},
  {q:"你习惯客观分析问题",a:"是",b:"否",t:"T"},
  {q:"你容易被他人情绪影响",a:"是",b:"否",t:"F"},
  {q:"你喜欢计划清晰、按部就班",a:"是",b:"否",t:"J"},
  {q:"你喜欢灵活、随性、自由",a:"是",b:"否",t:"P"},
  {q:"你习惯提前安排好行程",a:"是",b:"否",t:"J"},
  {q:"你喜欢临时决定、随机应变",a:"是",b:"否",t:"P"},
  {q:"一群人聚会时你很活跃",a:"是",b:"否",t:"E"},
  {q:"人多后你会感到疲惫",a:"是",b:"否",t:"I"},
  {q:"你说话直接、注重效率",a:"是",b:"否",t:"T"},
  {q:"你说话委婉、顾及他人",a:"是",b:"否",t:"F"},
  {q:"你喜欢整理、秩序、规则",a:"是",b:"否",t:"J"},
  {q:"你喜欢变化、新鲜感、惊喜",a:"是",b:"否",t:"P"},
  {q:"你更务实、脚踏实地",a:"是",b:"否",t:"S"},
  {q:"你更创意、脑洞很大",a:"是",b:"否",t:"N"},
  {q:"压力下你会变得理性",a:"是",b:"否",t:"T"},
  {q:"压力下你会变得情绪化",a:"是",b:"否",t:"F"},
  {q:"你喜欢完成任务后放松",a:"是",b:"否",t:"J"},
  {q:"你喜欢边玩边做、随性完成",a:"是",b:"否",t:"P"},
  {q:"你容易和陌生人快速熟悉",a:"是",b:"否",t:"E"},
  {q:"你对陌生人保持距离",a:"是",b:"否",t:"I"},
  {q:"你重视事实与证据",a:"是",b:"否",t:"S"},
  {q:"你重视灵感与预感",a:"是",b:"否",t:"N"}
];

const el = (id) => document.getElementById(id);
let current = 0;
let answers = [];

function render(){
  const qbox = el("questions");
  qbox.innerHTML = "";
  questions.forEach((item,i)=>{
    const div = document.createElement("div");
    div.className = "question "+(i==current?"active":"");
    div.innerHTML = `
      <div class="q-title">${i+1}. ${item.q}</div>
      <div class="options">
        <div class="opt" data-v="A">${item.a}</div>
        <div class="opt" data-v="B">${item.b}</div>
      </div>
    `;
    qbox.appendChild(div);
  });

  document.querySelectorAll(".opt").forEach(o=>{
    o.onclick = ()=>{
      o.parentElement.querySelectorAll(".opt").forEach(x=>x.classList.remove("active"));
      o.classList.add("active");
      answers[current] = o.getAttribute("data-v");
    }
  });
}

function updateBar(){
  el("bar").style.width = ((current+1)/questions.length)*100 + "%";
}

render();
updateBar();

el("next").onclick = ()=>{
  if(!answers[current]) return alert("请选择一个选项");
  if(current < questions.length-1){
    document.querySelectorAll(".question")[current].classList.remove("active");
    current++;
    document.querySelectorAll(".question")[current].classList.add("active");
    updateBar();
    if(current == questions.length-1){
      el("submit").style.display = "block";
      el("next").style.display = "none";
    }
  }
}

el("prev").onclick = ()=>{
  if(current > 0){
    document.querySelectorAll(".question")[current].classList.remove("active");
    current--;
    document.querySelectorAll(".question")[current].classList.add("active");
    updateBar();
    el("submit").style.display = "none";
    el("next").style.display = "block";
  }
}

el("submit").onclick = ()=>{
  let E=0,I=0,S=0,N=0,T=0,F=0,J=0,P=0;
  questions.forEach((q,i)=>{
    const t = q.t;
    if(answers[i] == "A"){
      if(t=="E")E++;if(t=="I")I++;if(t=="S")S++;if(t=="N")N++;
      if(t=="T")T++;if(t=="F")F++;if(t=="J")J++;if(t=="P")P++;
    }
  });
  const type = (E>I?"E":"I")+(S>N?"S":"N")+(T>F?"T":"F")+(J>P?"J":"P");
  el("mbti").innerText = type;
  el("desc").innerText = type+" 型人格，是MBTI16型中的一种，拥有独特性格、天赋与行为模式。";
  el("result").style.display = "block";
  el("questions").style.display = "none";
  el("submit").style.display = "none";
  el("prev").style.display = "none";
  el("next").style.display = "none";
}
</script>
</body>
</html>
